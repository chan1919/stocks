name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Check for conflict markers and validate JSON
        run: |
          if grep -rn '<<<<<<<\|>>>>>>>' data/; then
            echo "ERROR: git merge conflict markers found in data/ files!"
            exit 1
          fi
          python -c "import json; [json.load(open(f, encoding='utf-8')) for f in ['data/valuation.json', 'data/shares_cache.json', 'data/financials.json']]"
          echo "All JSON files valid"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
