name: Daily Valuation Update

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 周一至周五 北京时间 22:30 (UTC 14:30), 收盘后运行
    - cron: '0 0 1 * *'        # 每月 1 日保活, 防止 GitHub 因 60 天无仓库活动自动禁用定时任务
  push:
    branches: [main]
    paths: ['README.md', 'pipeline.py', '.github/workflows/daily_update.yml']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: valuation-update
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  PIP_CACHE_VERSION: v1

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: Print current time (debug)
        run: |
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Beijing time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          echo "Triggered by: ${{ github.event_name }}"

      - name: Run pipeline
        run: python pipeline.py

      - name: Check for merge conflict markers
        run: |
          if grep -rn '<<<<<<<\|>>>>>>>' data/; then
            echo "ERROR: git merge conflict markers found in data/ files!"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "Valuation Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/valuation.json data/shares_cache.json data/financials.json
          git diff --staged --quiet || git commit -m "chore: daily valuation update $(TZ=Asia/Shanghai date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: Keepalive - update timestamp file (monthly)
        if: github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'
        run: |
          echo "Keepalive run: $(date -u '+%Y-%m-%d %H:%M:%S')" > .github/keepalive
          git config user.name "Valuation Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive
          git diff --staged --quiet || git commit -m "chore: keepalive $(TZ=Asia/Shanghai date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
