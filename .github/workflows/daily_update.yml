name: Daily Valuation Update

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 周一至周五 北京时间 22:30 (UTC 14:30), 收盘后运行
  workflow_dispatch:           # 允许手动触发

permissions:
  contents: write              # 允许 workflow 提交回仓库

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit and push
        run: |
          git config user.name "Valuation Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/valuation.json
          git diff --staged --quiet || git commit -m "chore: daily valuation update $(date -u +'%Y-%m-%d')"
          git push
