<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逻辑估值表</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", Roboto, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 1600px; margin: 0 auto; }

  header {
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 12px; margin-bottom: 18px;
  }
  h1 {
    font-size: 26px; font-weight: 700; color: #0f172a;
  }
  h1 .sub { font-size: 13px; font-weight: 400; color: #64748b; margin-left: 8px; }
  .meta { font-size: 13px; color: #64748b; }
  .meta span { margin-left: 14px; }
  .meta b { color: #0f172a; }

  .table-wrap {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 3px rgba(15,23,42,0.06);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    position: sticky; top: 0; z-index: 10;
    background: #f1f5f9; color: #334155; font-weight: 600;
    padding: 11px 8px; text-align: right; white-space: nowrap;
    border-bottom: 1px solid #e2e8f0;
    cursor: pointer; user-select: none;
  }
  thead th:first-child { text-align: left; }
  thead th:hover { color: #2563eb; }
  thead th.sorted { color: #2563eb; }
  thead th .arrow { font-size: 10px; margin-left: 2px; }

  tbody td {
    padding: 10px 8px; text-align: right; white-space: nowrap;
    border-bottom: 1px solid #f1f5f9;
    transition: background 0.15s;
  }
  tbody td:first-child { text-align: left; font-weight: 600; color: #0f172a; }
  tbody tr:hover td { background: #eff6ff; }

  /* 估值比单元格颜色 — 由 JS 内联设置 */
  td.ratio { font-weight: 700; font-size: 14px; }
  /* 重要列高亮: 股价 / 均值ROE / 均值PE / 均值利润 */
  td.key { font-weight: 600; color: #0f172a; background: #eef4ff; border-left: 2px solid #c7d2fe; }
  tbody tr:hover td.key { background: #e0e7ff; }

  .name-cell { display: flex; align-items: center; gap: 6px; }
  .market-tag {
    font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600;
  }
  .tag-A  { background: #dbeafe; color: #1d4ed8; }
  .tag-HK { background: #fee2e2; color: #b91c1c; }
  .tag-US { background: #ede9fe; color: #6d28d9; }

  .loading {
    text-align: center; padding: 60px; color: #94a3b8; font-size: 15px;
  }
  .loading .spin {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid #e2e8f0; border-top-color: #2563eb;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  tbody tr { animation: fadeIn 0.4s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  .footer { margin-top: 16px; font-size: 11px; color: #94a3b8; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>逻辑估值表<span class="sub">估值比 = 均值PE / 均值ROE</span></h1>
    <div class="meta">
      <span>更新时间: <b id="updateTime">—</b></span>
      <span>共 <b id="count">—</b> 只</span>
      <span>失败 <b id="failed">—</b></span>
    </div>
  </header>

  <div class="table-wrap">
    <table id="table">
      <thead>
        <tr id="thead"></tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="15" class="loading"><span class="spin"></span>正在加载数据…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    数据由 akshare 自动采集 · GitHub Actions 每日更新 · 股价、市值、利润均为各市场本币<br>
    港股:股价/市值 HKD 利润 CNY · 美股:股价/市值 USD 利润按报告币种 · 仅供学习参考, 不构成投资建议
  </div>
</div>

<script>
const KEY_COLS = new Set(["股价", "均值ROE", "均值PE", "均值利润"]);

const COLS = [
  { key: "证券简称", label: "证券简称", align: "left",  fmt: v => v },
  { key: "股价",    label: "股价",    align: "right", fmt: v => v },
  { key: "股本",    label: "股本(亿)",align: "right", fmt: v => v },
  { key: "市值",    label: "市值(亿)",align: "right", fmt: v => v },
  { key: "ROE",     label: "ROE%",    align: "right", fmt: v => v },
  { key: "ROE2",    label: "ROE2%",   align: "right", fmt: v => v },
  { key: "ROE3",    label: "ROE3%",   align: "right", fmt: v => v },
  { key: "均值ROE", label: "均值ROE%",align: "right", fmt: v => v },
  { key: "利润",    label: "利润(亿)",align: "right", fmt: v => v },
  { key: "利润2",   label: "利润2(亿)",align: "right",fmt: v => v },
  { key: "利润3",   label: "利润3(亿)",align: "right",fmt: v => v },
  { key: "均值利润",label: "均值利润(亿)",align:"right",fmt: v=>v },
  { key: "均值PE",  label: "均值PE",  align: "right", fmt: v => v },
  { key: "估值比",  label: "估值比",  align: "right", fmt: v => v, ratio: true },
];

// 估值比颜色: 0 -> 深绿, 1 -> 黄, 2 -> 红, >2 -> 更深红. 统一白字保证可读性.
function ratioColor(r) {
  if (r == null || isNaN(r)) return { bg: "#e2e8f0", fg: "#64748b" };
  const t = Math.min(r / 2, 1);
  // 色相 140(绿) -> 60(黄) -> 0(红) 线性过渡
  const hue = 140 - 140 * t;
  const S = 62;
  // 亮度统一 46, 保证白字在所有色相下都有足够对比度
  const L = 46;
  // r > 2 时进一步加深红色, 强化"严重高估"
  if (r > 2) {
    const ex = Math.min((r - 2) / 2, 1);
    return { bg: `hsl(0, ${S}%, ${L - ex * 16}%)`, fg: "#fff" };
  }
  return { bg: `hsl(${hue}, ${S}%, ${L}%)`, fg: "#fff" };
}

let DATA = [];
let sortKey = "估值比";
let sortAsc = true;

function renderHead() {
  const tr = document.getElementById("thead");
  tr.innerHTML = COLS.map(c => {
    const cls = c.key === sortKey ? "sorted" : "";
    const arrow = c.key === sortKey ? (sortAsc ? "▲" : "▼") : "";
    return `<th class="${cls}" data-key="${c.key}">${c.label}<span class="arrow">${arrow}</span></th>`;
  }).join("");
  tr.querySelectorAll("th").forEach(th => {
    th.onclick = () => {
      const k = th.dataset.key;
      if (k === sortKey) sortAsc = !sortAsc; else { sortKey = k; sortAsc = true; }
      renderHead(); renderBody();
    };
  });
}

function renderBody() {
  const tb = document.getElementById("tbody");
  if (!DATA.length) {
    tb.innerHTML = `<tr><td colspan="${COLS.length}" class="loading">暂无数据</td></tr>`;
    return;
  }
  const rows = [...DATA].sort((a, b) => {
    const x = a[sortKey], y = b[sortKey];
    if (typeof x === "string") return sortAsc ? x.localeCompare(y, "zh") : y.localeCompare(x, "zh");
    return sortAsc ? (x - y) : (y - x);
  });
  tb.innerHTML = rows.map((r, i) => {
    const tds = COLS.map(c => {
      const val = r[c.key];
      if (c.key === "证券简称") {
        const tag = `<span class="market-tag tag-${r["市场"]}">${r["市场"]}</span>`;
        return `<td><div class="name-cell">${tag}${val}</div></td>`;
      }
      if (c.ratio) {
        const col = ratioColor(val);
        return `<td class="ratio" style="background:${col.bg};color:${col.fg}">${val}</td>`;
      }
      if (KEY_COLS.has(c.key)) {
        return `<td class="key">${c.fmt(val)}</td>`;
      }
      return `<td>${c.fmt(val)}</td>`;
    }).join("");
    return `<tr style="animation-delay:${i * 0.02}s">${tds}</tr>`;
  }).join("");
}

function renderMeta(meta) {
  document.getElementById("updateTime").textContent = meta.update_time || "—";
  document.getElementById("count").textContent = meta.total ?? meta.count ?? "—";
  document.getElementById("failed").textContent = (meta.failed && meta.failed.length) ? meta.failed.length : 0;
}

async function load() {
  try {
    const res = await fetch("data/valuation.json?_=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    DATA = json.data || [];
    renderMeta(json);
    renderHead();
    renderBody();
  } catch (e) {
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="${COLS.length}" class="loading">加载失败: ${e.message}<br><span style="font-size:12px;color:#94a3b8">请先运行 pipeline.py 生成 data/valuation.json</span></td></tr>`;
  }
}

load();
</script>
</body>
</html>
